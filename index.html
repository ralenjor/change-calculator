
<!DOCTYPE html>
<html>
  <head>

    <meta charset="utf-8">
     <meta http-equiv="Content-Security-Policy" 
      content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; object-src 'none';">

    <title>Change Calculator</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

     <div class="change-container">
      <h1 class="title">Change Calculator</h1>
      </div>
      <div class="text-container">
        <span class="left-text">What is the total cost?</span><span class="right-text">How much did the customer give you?</span>
        </div>
        
      
      <div class="input-container">
        <input id="amount-due" type="text" placeholder="$1.00"/>
        <input id="amount-received" type="text" placeholder="$1.00"/>
      </div>
      <div class="calculate">
      <p><button id="calculate-change">Calculate</button></p>
      </div>
<div id="results-wrapper">
  <p id="change-due"></p>
  <p id="total-output"></p>
  <div class="coin-row"><span class="coin-label">Dollars: </span><p id="dollars-output" class="coin-value"></p></div>
  <div class="coin-row"><span class="coin-label">Quarters: </span><p id="quarters-output" class="coin-value"></p></div>
  <div class="coin-row"><span class="coin-label">Dimes: </span><p id="dimes-output" class="coin-value"></p></div>
  <div class="coin-row"><span class="coin-label">Nickels: </span><p id="nickels-output" class="coin-value"></p></div>
  <div class="coin-row"><span class="coin-label">Pennies: </span><p id="pennies-output" class="coin-value"></p></div>
</div>

    <script src = "main.js" type="module"></script>
  </body>
</html>
